services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wordstore
      POSTGRES_PASSWORD: wordstore
      POSTGRES_DB: wordstore
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordstore"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
