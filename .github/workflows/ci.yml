name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (race detector)
        env:
          # libSQL/Turso integration tests run only when these are set, and
          # skip cleanly otherwise. Forks / external PRs don't get repository
          # secrets, so the pipeline still passes for them.
          WATCHWORD_TEST_TURSO_URL: ${{ secrets.WATCHWORD_TEST_TURSO_URL }}
          WATCHWORD_TEST_TURSO_AUTH_TOKEN: ${{ secrets.WATCHWORD_TEST_TURSO_AUTH_TOKEN }}
        run: go test -race -timeout 5m ./...

  turso:
    # Optional integration job — runs Turso tests in isolation. Uses
    # `continue-on-error` so a flaky/unavailable test DB never blocks merges.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Turso integration tests
        env:
          WATCHWORD_TEST_TURSO_URL: ${{ secrets.WATCHWORD_TEST_TURSO_URL }}
          WATCHWORD_TEST_TURSO_AUTH_TOKEN: ${{ secrets.WATCHWORD_TEST_TURSO_AUTH_TOKEN }}
        run: go test -v -timeout 5m -run TestLibSQL ./internal/repository/...

  concurrency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: SQLite concurrency stress (repository)
        run: go test -race -count=5 -run='Concurrent|PragmasOnEveryPoolConnection' -timeout 5m ./internal/repository/...
      - name: SQLite concurrency stress (service)
        run: go test -race -count=5 -run='Concurrent' -timeout 5m ./internal/service/...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: CGO_ENABLED=0 go build -o watchword ./cmd/server
      - name: Verify binary runs
        run: ./watchword --help || true
