server:
  transport: "stdio"
  sse_port: 8080
  health_port: 8081

database:
  driver: "sqlite"
  sqlite:
    path: "./data/word-store.db"
  postgres:
    dsn: "postgres://wordstore:wordstore@localhost:5434/wordstore?sslmode=disable"

auth:
  enabled: true
  tokens:
    - "your-secret-token-1"
  # resource_metadata:               # RFC 9728 Protected Resource Metadata (MCP OAuth)
  #   resource: "https://watchword.example.com"
  #   authorization_servers:
  #     - "https://auth.example.com"
  #   bearer_methods_supported: ["header"]
  #   scopes_supported: []
  # jwt:                             # External OAuth/JWT validation
  #   jwks_url: "https://auth.example.com/.well-known/jwks.json"
  #   issuer: "https://auth.example.com/"
  #   audience: "https://watchword.example.com"
  # oauth_metadata:                  # Legacy AS metadata (2025-03-26 MCP spec compat)
  #   authorization_endpoint: "https://auth.example.com/authorize"
  #   token_endpoint: "https://auth.example.com/oauth/token"

expiration:
  enabled: true
  interval_hours: 24
  ttl_hours: 168

logging:
  level: "info"
  format: "json"

